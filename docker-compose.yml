services:
  # MySQL データベース
  mysql:
    image: mysql:8.0
    container_name: ${APP_NAME}_mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_CHARSET: ${MYSQL_CHARSET}
      MYSQL_COLLATION: ${MYSQL_COLLATION}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ${MYSQL_VOLUME_1:-/dev/null}:/var/lib/mysql
      - ${MYSQL_VOLUME_2:-/dev/null}:/docker-entrypoint-initdb.d
    command: >
      --authentication-policy=caching_sha2_password
      --host-cache-size=0
      --log-bin-trust-function-creators=1
      --character-set-server=${MYSQL_CHARSET}
      --collation-server=${MYSQL_COLLATION}
      --sql_mode=STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 10s
      retries: 10
      interval: 10s
      start_period: 30s

  # Backend API サーバー
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${APP_NAME}_backend
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      DATABASE_URL: ${BACKEND_DATABASE_URL}
      BACKEND_DATABASE_URL: ${BACKEND_DATABASE_URL}
      BACKEND_JWT_SECRET: ${BACKEND_JWT_SECRET}
      BACKEND_NODE_ENV: ${BACKEND_NODE_ENV}
      BACKEND_DB_HOST: ${BACKEND_DB_HOST}
      BACKEND_DB_USER: ${BACKEND_DB_USER}
      BACKEND_DB_PASSWORD: ${BACKEND_DB_PASSWORD}
      BACKEND_DB_NAME: ${BACKEND_DB_NAME}
      BACKEND_DB_PORT: ${BACKEND_DB_PORT}
      BACKEND_USER_ID: ${BACKEND_USER_ID}
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ${BACKEND_VOLUME_1:-/dev/null}:/app
      - /app/node_modules
    networks:
      - app_network
    command: ["bash" ,"./script/backendStartUp.sh"]

  # Frontend Vue.js アプリ
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${APP_NAME}_frontend
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      FRONTEND_VITE_API_URL: ${FRONTEND_VITE_API_URL}
      FRONTEND_HOST: ${FRONTEND_HOST}
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    volumes:
      - ${FRONTEND_VOLUME_1:-/dev/null}:/app
      - /app/node_modules
    networks:
      - app_network
    command: ["sh", "-c", "npm run dev -- --host ${FRONTEND_HOST} --port ${FRONTEND_PORT}"]

volumes:
  mysql_data:
    driver: local

networks:
  app_network:
    driver: bridge
    name: ${NETWORK_NAME}
